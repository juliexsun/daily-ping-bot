name: Daily Discord Ping

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node send.js
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
